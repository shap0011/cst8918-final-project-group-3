name: Application CI/CD (Build, Push & Deploy)

on:
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'Dockerfile'
      - 'k8s/**'
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'Dockerfile'
      - 'k8s/**'

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ github.sha }}
    env:
      ACR_NAME: ${{ vars.ACR_NAME }}
      IMAGE_NAME: remix-weather-app
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and Push Docker Image
        run: |
          FULL_IMAGE_NAME="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -t $FULL_IMAGE_NAME .
          docker push $FULL_IMAGE_NAME

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event_name == 'pull_request' && 'test' || 'production' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Kubernetes Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Check file path
        run: |
          pwd
          find . -name "deployment.yaml"

      - name: Deploy to AKS
        run: |
          IMAGE_URL="${{ vars.ACR_NAME }}.azurecr.io/remix-weather-app:${{ github.sha }}"
          sed -i "s|<IMAGE_PLACEHOLDER>|$IMAGE_URL|g" k8s/deployment.yaml

          kubectl apply -f k8s/deployment.yaml

          kubectl rollout status deployment/remix-weather-app
